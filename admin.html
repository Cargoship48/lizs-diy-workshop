<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Panel - Liz's DIY Workshop</title>
  <meta name="description" content="Admin panel for managing Liz's DIY Workshop orders">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--purple-deep);
      font-family: "Fredoka", sans-serif;
    }

    .stat-label {
      font-size: 0.95rem;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .order-card {
      background: var(--bg);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .order-card.pending {
      border-left: 4px solid var(--duck);
    }

    .order-card.fulfilled {
      border-left: 4px solid var(--mint);
      opacity: 0.7;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .order-info h3 {
      margin: 0 0 4px;
      color: var(--purple-deep);
      font-size: 1.25rem;
    }

    .order-meta {
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    .order-status {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .order-status.pending {
      background: var(--duck);
      color: #5a3d0e;
    }

    .order-status.fulfilled {
      background: var(--mint);
      color: #1a5a3a;
    }

    .order-items {
      margin: 16px 0;
      padding: 12px;
      background: #fff;
      border-radius: 12px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid var(--line);
      font-weight: 700;
      font-size: 1.15rem;
    }

    .order-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-small {
      padding: 8px 18px;
      font-size: 0.9rem;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }

    .empty-state svg {
      width: 120px;
      height: 120px;
      opacity: 0.6;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- Floating background decorations -->
  <div class="sky-dot a"></div>
  <div class="sky-dot b"></div>
  <div class="sky-dot c"></div>

  <!-- Navigation -->
  <header class="topbar">
    <a href="index.html" class="brand" aria-label="Go to home">
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <ellipse cx="56" cy="78" rx="42" ry="30" fill="#FFD15C"/>
        <circle cx="82" cy="46" r="23" fill="#FFD15C"/>
        <path d="M101 42 q20 1 18 12 q-2 9 -18 7 q-4 -10 0 -19 z" fill="#FF9E4D"/>
        <circle cx="86" cy="40" r="4.5" fill="#4A3B6B"/>
        <circle cx="87.5" cy="38.5" r="1.6" fill="#fff"/>
        <path d="M40 70 q22 18 46 6" fill="none" stroke="#F2B83E" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Liz's DIY Workshop - Admin</span>
    </a>

    <div class="nav-wrap">
      <button class="btn btn-ghost btn-small" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Statistics -->
    <div class="panel">
      <div class="admin-header">
        <div>
          <h2 class="section-title">Dashboard</h2>
          <p class="section-sub">Business overview and statistics</p>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid">
        <!-- Stats will be populated by JavaScript -->
      </div>
    </div>

    <!-- Orders -->
    <div class="panel">
      <div class="admin-header">
        <div>
          <h2 class="section-title">Orders</h2>
          <p class="section-sub">Manage customer orders</p>
        </div>
        <button class="btn btn-ghost btn-small" onclick="clearAllOrders()">Clear All Orders</button>
      </div>

      <div id="orders-container">
        <!-- Orders will be populated by JavaScript -->
      </div>
    </div>
  </main>

  <footer>
    Made with love by Elizabeth <span class="heart">&#9829;</span> (and a few ducks)
  </footer>

  <script>
    // Check if user is logged in
    if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
      window.location.href = 'admin-login.html';
    }

    function logout() {
      sessionStorage.removeItem('adminLoggedIn');
      window.location.href = 'admin-login.html';
    }

    function loadOrders() {
      const orders = JSON.parse(localStorage.getItem('squishOrders') || '[]');
      return orders.sort((a, b) => b.id - a.id); // Newest first
    }

    function updateStats() {
      const orders = loadOrders();
      const pendingOrders = orders.filter(o => o.status === 'pending');
      const fulfilledOrders = orders.filter(o => o.status === 'fulfilled');
      const totalSales = orders.reduce((sum, o) => sum + o.total, 0);

      // Count most popular squish
      const squishCount = {};
      orders.forEach(order => {
        order.items.forEach(item => {
          squishCount[item.name] = (squishCount[item.name] || 0) + item.quantity;
        });
      });
      const mostPopular = Object.keys(squishCount).length > 0
        ? Object.entries(squishCount).sort((a, b) => b[1] - a[1])[0][0]
        : 'None yet';

      const statsGrid = document.getElementById('stats-grid');
      statsGrid.innerHTML = '';

      const makeStatCard = (valueText, labelText, extraValueStyles = {}) => {
        const card = document.createElement('div');
        card.className = 'stat-card';

        const value = document.createElement('div');
        value.className = 'stat-value';
        value.textContent = valueText;
        Object.assign(value.style, extraValueStyles);

        const label = document.createElement('div');
        label.className = 'stat-label';
        label.textContent = labelText;

        card.appendChild(value);
        card.appendChild(label);
        statsGrid.appendChild(card);
      };

      makeStatCard(String(orders.length), 'Total Orders');
      makeStatCard(String(pendingOrders.length), 'Pending Orders');
      makeStatCard(`$${totalSales}`, 'Total Sales');
      makeStatCard(mostPopular, 'Most Popular', { fontSize: '1.3rem' });
    }

    function renderOrders() {
      const orders = loadOrders();
      const container = document.getElementById('orders-container');
      container.innerHTML = '';

      if (orders.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <ellipse cx="56" cy="78" rx="42" ry="30" fill="#FFD15C"/>
            <circle cx="82" cy="46" r="23" fill="#FFD15C"/>
            <path d="M101 42 q20 1 18 12 q-2 9 -18 7 q-4 -10 0 -19 z" fill="#FF9E4D"/>
            <circle cx="86" cy="40" r="4.5" fill="#4A3B6B"/>
          </svg>
          <h3>No orders yet</h3>
          <p>Orders will appear here when customers make purchases.</p>
          <a href="shop.html" class="btn btn-main" style="margin-top: 16px;">Go to Shop</a>
        `;
        container.appendChild(empty);
        return;
      }

      orders.forEach(order => {
        const date = new Date(order.date);
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();

        const card = document.createElement('div');
        card.className = `order-card ${order.status}`;

        const header = document.createElement('div');
        header.className = 'order-header';

        const info = document.createElement('div');
        info.className = 'order-info';

        const title = document.createElement('h3');
        title.textContent = order.customerName;

        const meta = document.createElement('div');
        meta.className = 'order-meta';
        meta.textContent = `Order #${order.id} • ${dateStr}`;

        info.appendChild(title);
        info.appendChild(meta);

        const statusSpan = document.createElement('span');
        statusSpan.className = `order-status ${order.status}`;
        statusSpan.textContent = order.status;

        header.appendChild(info);
        header.appendChild(statusSpan);

        const itemsContainer = document.createElement('div');
        itemsContainer.className = 'order-items';

        order.items.forEach(item => {
          const row = document.createElement('div');
          row.className = 'order-item';

          const left = document.createElement('span');
          left.textContent = `${item.quantity}x ${item.name}`;

          const right = document.createElement('span');
          right.textContent = `$${item.price * item.quantity}`;

          row.appendChild(left);
          row.appendChild(right);
          itemsContainer.appendChild(row);
        });

        const totalRow = document.createElement('div');
        totalRow.className = 'order-total';

        const totalLabel = document.createElement('span');
        totalLabel.textContent = 'Total';

        const totalValue = document.createElement('span');
        totalValue.textContent = `$${order.total}`;

        totalRow.appendChild(totalLabel);
        totalRow.appendChild(totalValue);
        itemsContainer.appendChild(totalRow);

        const actions = document.createElement('div');
        actions.className = 'order-actions';

        const toggleBtn = document.createElement('button');
        toggleBtn.className = `btn btn-small ${
          order.status === 'pending' ? 'btn-main' : 'btn-ghost'
        }`;
        toggleBtn.textContent =
          order.status === 'pending' ? 'Mark as Fulfilled' : 'Mark as Pending';
        toggleBtn.addEventListener('click', () => {
          if (order.status === 'pending') {
            markFulfilled(order.id);
          } else {
            markPending(order.id);
          }
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn btn-ghost btn-small';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteOrder(order.id));

        actions.appendChild(toggleBtn);
        actions.appendChild(deleteBtn);

        card.appendChild(header);
        card.appendChild(itemsContainer);
        card.appendChild(actions);

        container.appendChild(card);
      });
    }

    function markFulfilled(orderId) {
      const orders = loadOrders();
      const order = orders.find(o => o.id === orderId);
      if (order) {
        order.status = 'fulfilled';
        localStorage.setItem('squishOrders', JSON.stringify(orders));
        updateStats();
        renderOrders();
      }
    }

    function markPending(orderId) {
      const orders = loadOrders();
      const order = orders.find(o => o.id === orderId);
      if (order) {
        order.status = 'pending';
        localStorage.setItem('squishOrders', JSON.stringify(orders));
        updateStats();
        renderOrders();
      }
    }

    function deleteOrder(orderId) {
      if (!confirm('Are you sure you want to delete this order?')) return;

      const orders = loadOrders();
      const filtered = orders.filter(o => o.id !== orderId);
      localStorage.setItem('squishOrders', JSON.stringify(filtered));
      updateStats();
      renderOrders();
    }

    function clearAllOrders() {
      if (!confirm('Are you sure you want to delete ALL orders? This cannot be undone!')) return;

      localStorage.removeItem('squishOrders');
      updateStats();
      renderOrders();
    }

    // Initialize
    updateStats();
    renderOrders();
  </script>
</body>
</html>
